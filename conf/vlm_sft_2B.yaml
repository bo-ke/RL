sft:
  ## total number of steps to train will equal
  ## min((max_num_epochs * len(train_dataloader)), max_num_steps)
  val_period: 10
  val_batches: 8
  val_global_batch_size: 32
  val_micro_batch_size: 1
  max_num_epochs: 1
  max_num_steps: 60
  val_at_start: false
  seed: 42

policy:
  # model_name: "../Qwen3-VL-4B-Thinking"
  model_name: "../ERNIE-4.5-VL-28B-A3B-Thinking"
  tokenizer:
    name: ${policy.model_name} ## specify if you'd like to use a tokenizer different from the model's default
  train_global_batch_size: 8
  train_micro_batch_size: 1
  max_total_sequence_length: 1024
  precision: "bfloat16"
  offload_optimizer_for_logprob: false


  sequence_packing:
    enabled: False
  
  make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}
  max_grad_norm: 1.0

  dtensor_cfg:
    _v2: true
    enabled: true
    env_vars: {}
    cpu_offload: False
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    expert_parallel_size: 8  # EP size for MoE models, must divide gpus_per_node
    custom_parallel_plan: null
  
  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    sequence_length_round: 64

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 5.0e-6
      weight_decay: 0.1
      betas: [0.9, 0.98]
      eps: 1e-5
      # when using Dtensor, we need to set foreach
      # and fused to False
      foreach: False
      fused: False

checkpointing:
  enabled: true
  save_consolidated: true
  checkpoint_dir: "results/sft_${policy.model_name}"
  metric_name: "val:val_loss" # one of "val:" or "train:" followed by the metric name
  higher_is_better: false
  keep_top_k: 1
  save_period: 10
  checkpoint_must_save_by: null

data:
  add_generation_prompt: true
  max_input_seq_length: ${policy.max_total_sequence_length} # upper bound, real truncation occurs at vllm.max_model_len
  # filelist: "conf/data_conf_ernie_router_1119/toy_filelist"
  train_data_config: ernie_router_data_conf_1125/ernie_router_data_config_1125.json 
  #train_data_config: conf/data_conf_ernie_router_1119/toy_train_config.json  
  prompt_file: ""
  system_prompt_file: null
  dataset_name: "ernie_router_1119"
  split: ""
  shuffle: true
  num_workers: 1

logger:
  log_dir: "logs"  # Base directory for all logs
  wandb_enabled: false # Make sure you do a ``wandb login [Your API key]'' before running
  swanlab_enabled: false
  mlflow_enabled: false
  tensorboard_enabled: true
  monitor_gpus: true  # If true, will monitor GPU usage and log to wandb and/or tensorboard
  wandb:
    project: "sft-dev"
    name: "sft-dev-${data.dataset_name}"
  tensorboard:
    log_dir: "tb_logs-sft-dev-${data.dataset_name}"
  gpu_monitoring:
    collection_interval: 10  # How often to collect GPU usage metrics (in seconds)
    flush_interval: 10  # How often to flush GPU usage metrics to the loggers (in seconds)

cluster:
  gpus_per_node: 8
  num_nodes: 1
